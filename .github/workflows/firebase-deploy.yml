name: Firebase Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  FIREBASE_PROJECT_PRODUCTION: ${{ vars.FIREBASE_PROJECT_PRODUCTION || 'pedidos-aswa-peru' }}
  FIREBASE_PROJECT_STAGING: ${{ vars.FIREBASE_PROJECT_STAGING || 'pedidos-aswa-peru-staging' }}

jobs:
  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: firebase-staging
      cancel-in-progress: true
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'staging') ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Authenticate Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to staging
        run: npx -y firebase-tools@13.15.1 deploy --only hosting,firestore:rules,firestore:indexes,storage --project "$FIREBASE_PROJECT_STAGING"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: firebase-production
      cancel-in-progress: true
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Authenticate Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to production
        run: npx -y firebase-tools@13.15.1 deploy --only hosting,firestore:rules,firestore:indexes,storage --project "$FIREBASE_PROJECT_PRODUCTION"
